<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="crypto-decision-assistant/extension/dist/assets/icon.png">
    <title>Crypto Decision Assistant Settings</title>
    <link rel="stylesheet" href="crypto-decision-assistant/extension/dist/assets/options.css">
  </head>
  <body><main><h1 data-en="Settings" data-ar="الإعدادات">Settings</h1><form id="form">
    <label data-en="Language" data-ar="اللغة">Language <select id="language"><option value="en">English</option><option value="ar">العربية</option></select></label>
    <label data-en="Backend URL" data-ar="عنوان الخادم">Backend URL <input id="apiBaseUrl" type="url" required></label>
    <fieldset><legend data-en="Symbols" data-ar="العملات">Symbols</legend><label class="inline"><input id="btc" type="checkbox"> BTCUSDT</label><label class="inline"><input id="eth" type="checkbox"> ETHUSDT</label></fieldset>
    <fieldset><legend data-en="Assets I currently hold (enables take-profit/sell watch)" data-ar="العملات التي أمتلكها حاليًا (لتفعيل مراقبة البيع/جني الأرباح)">Assets I currently hold (enables take-profit/sell watch)</legend><label class="inline"><input id="holdBtc" type="checkbox"> BTC</label><label class="inline"><input id="holdEth" type="checkbox"> ETH</label></fieldset>
    <label data-en="Refresh every (seconds)" data-ar="التحديث كل (ثانية)">Refresh every (seconds) <input id="refreshSeconds" type="number" min="5" max="45"></label>
    <label data-en="Analysis timeframe" data-ar="الإطار الزمني للتحليل">Analysis timeframe <select id="analysisTimeframe"><option value="1H">1H</option><option value="4H">4H</option><option value="1D">1D</option><option value="1W">1W</option><option value="1M">1M</option></select></label>
    <label data-en="Risk mode" data-ar="نمط المخاطرة">Risk mode <select id="riskMode"><option>Conservative</option><option>Balanced</option><option>Aggressive</option></select></label>
    <label class="inline" data-en="Enable sound" data-ar="تشغيل الصوت"><input id="soundEnabled" type="checkbox"> Enable sound</label>
    <label class="inline" data-en="Sound for strong signals only" data-ar="الصوت للإشارات القوية فقط"><input id="soundOnlyForStrongSignals" type="checkbox"> Sound for strong signals only</label>
    <label data-en="Minimum decision score for notifications" data-ar="أقل درجة قرار للإشعارات">Minimum decision score for notifications <input id="notificationConfidence" type="number" min="0" max="100"></label>
    <fieldset><legend data-en="New price alert" data-ar="تنبيه سعر جديد">New price alert</legend><div class="row"><select id="alertSymbol"><option>BTCUSDT</option><option>ETHUSDT</option></select><select id="alertCondition"><option value="above">At or above</option><option value="below">At or below</option></select><input id="alertPrice" type="number" min="0" step="any" placeholder="Price"><button id="addAlert" type="button" data-en="Add" data-ar="إضافة">Add</button></div><div id="alerts"></div></fieldset>
    <div class="form-actions"><button id="testNotification" type="button" data-en="Test notification + sound" data-ar="اختبار الإشعار والصوت">Test notification + sound</button></div><span id="saved"></span>
  </form><p class="disclaimer" data-en="We never request Binance keys or account data, and never place buy or sell orders." data-ar="لا نطلب مفاتيح Binance ولا بيانات الحساب، ولا ننفذ أي أوامر شراء أو بيع.">We never request Binance keys or account data, and never place buy or sell orders.</p></main>
  <script type="module" src="crypto-decision-assistant/extension/dist/assets/options.js"></script></body>
</html>
